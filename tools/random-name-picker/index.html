<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2241687723515076" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Name Picker — Lazy Cat Tools</title>
  <meta name="description" content="Pick a random name from your list instantly. Free random name picker — no sign-up required.">
  <meta property="og:title" content="Random Name Picker — Lazy Cat Tools">
  <meta property="og:description" content="Pick a random name from your list instantly. Free, no sign-up.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lazycattools.com/tools/random-name-picker/">
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/site.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="site-logo" aria-label="Lazy Cat Tools home">
        <img class="site-logo-icon" src="/assets/images/lazy cat.svg" alt="" aria-hidden="true">
        <span class="site-logo-text">Lazy Cat Tools</span>
      </a>
    </div>
  </header>

  <!-- Ad Slot: Top Banner -->
  <div class="ad-slot ad-top" aria-hidden="true">
    <!-- AdSense code goes here -->
  </div>

  <main id="main-content" class="tool-main">

    <div class="tool-header">
      <h1>Random Name Picker</h1>
      <p>Add your names, pick a winner — instantly.</p>
    </div>

    <div class="tool-card">
      <section class="input-section" aria-label="Name list setup">

        <div class="field-group">
          <label for="names-input">Names <span class="hint">— one per line or comma-separated</span></label>
          <textarea
            id="names-input"
            rows="7"
            placeholder="Alice&#10;Bob&#10;Charlie&#10;Dave&#10;&#10;Or paste: Alice, Bob, Charlie, Dave"
            spellcheck="false"
          ></textarea>
          <div class="upload-row">
            <label class="btn-upload" for="file-input">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload .txt or .csv
            </label>
            <input type="file" id="file-input" accept=".txt,.csv" aria-label="Upload a text or CSV file of names">
            <span class="upload-hint" id="upload-hint" aria-live="polite"></span>
          </div>
        </div>

        <label class="toggle-label">
          <input type="checkbox" id="remove-toggle">
          <span>Remove picked names <span class="hint">— pick everyone once</span></span>
        </label>

        <button id="btn-pick" class="btn-primary">Pick a Name</button>

      </section>

      <section class="results-section" id="results-section" aria-live="polite" aria-labelledby="results-heading" hidden>
        <h2 class="results-heading" id="results-heading">Winner</h2>

        <div class="winner-display" id="winner-display">
          <div class="winner-name" id="winner-name"></div>
          <div class="winner-meta" id="winner-meta"></div>
        </div>

        <div class="action-row">
          <button id="btn-pick-again" class="btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
            Pick Again
          </button>
          <button id="btn-reset" class="btn-secondary" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
            Reset Pool
          </button>
          <button id="btn-copy" class="btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Name
          </button>
          <button id="btn-share" class="btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share Link
          </button>
        </div>
      </section>

      <div class="empty-state" id="empty-state" hidden>
        <p>All names have been picked! Reset the pool to start over.</p>
        <button id="btn-reset-empty" class="btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
          Reset Pool
        </button>
      </div>

    </div>

    <div class="crosslink-card">
      <span class="crosslink-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </span>
      <div>
        <strong>Need to split into teams first?</strong>
        <a href="/tools/random-team-generator/">Random Team Generator →</a>
      </div>
    </div>

  </main>

  <!-- Ad Slot: Bottom Banner -->
  <div class="ad-slot ad-bottom" aria-hidden="true">
    <!-- AdSense code goes here -->
  </div>

  <footer class="site-footer">
    <div class="footer-cat-wrap" aria-hidden="true">
      <img class="footer-cat-peek" src="/assets/images/lazy cat.svg" alt="" aria-hidden="true">
    </div>
    <div class="site-footer-inner">
      <p>© 2026 Lazy Cat Tools</p>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="/pages/about/">About</a>
        <a href="/pages/privacy/">Privacy</a>
      </nav>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
